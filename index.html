<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>UV-Index</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- iOS home screen web app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="UV-Index" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

    <!-- Theme color for browser chrome -->
    <meta name="theme-color" content="#f0932b" />

    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Hämtar UV-data…</div>
    </div>

    <div class="app">
      <div class="location-bar">
        <svg width="14" height="16" viewBox="0 0 14 16" fill="none">
          <path
            d="M7 0C4.24 0 2 2.24 2 5c0 3.75 5 9 5 9s5-5.25 5-9c0-2.76-2.24-5-5-5zm0 6.75A1.75 1.75 0 1 1 7 3.25a1.75 1.75 0 0 1 0 3.5z"
            fill="#999"
          />
        </svg>
        <span id="location-text">Hämtar plats…</span>
      </div>

      <div class="error-banner" id="error-banner"></div>

      <div class="uv-card">
        <!-- UV circle -->
        <div class="uv-circle-wrap">
          <div class="uv-circle lvl-mod" id="uv-circle">
            <svg class="uv-ring-svg" viewBox="0 0 148 148" id="uv-ring-svg">
              <circle
                cx="74"
                cy="74"
                r="68"
                fill="none"
                stroke="#f0f0f0"
                stroke-width="10"
              />
              <circle
                cx="74"
                cy="74"
                r="68"
                fill="none"
                stroke="url(#ringGrad)"
                stroke-width="10"
                stroke-linecap="round"
                stroke-dasharray="427"
                stroke-dashoffset="427"
                id="uv-ring-fill"
              />
              <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop id="grad-stop1" offset="0%" stop-color="#f9ca24" />
                  <stop id="grad-stop2" offset="100%" stop-color="#f0932b" />
                </linearGradient>
              </defs>
            </svg>
            <div class="uv-circle-inner">
              <div class="uv-number" id="uv-number">—</div>
              <div class="uv-desc" id="uv-desc">UV-index</div>
            </div>
          </div>
        </div>

        <!-- Skin type picker -->
        <div class="skin-section">
          <div class="label-sm">Min hudtyp</div>
          <div class="skin-grid" id="skin-grid"></div>
          <div>
            <div class="skin-label" id="skin-label">—</div>
            <div class="skin-sublabel" id="skin-sublabel">—</div>
          </div>
        </div>
      </div>

      <!-- Exposure time cards -->
      <div class="time-cards">
        <div class="time-card">
          <div class="time-icon">☀️</div>
          <div class="time-label">Direkt sol</div>
          <div class="time-value" id="t-direct">—</div>
        </div>
        <div class="time-card">
          <div class="time-icon">⛅</div>
          <div class="time-label">Lite skugga</div>
          <div class="time-value" id="t-partial">—</div>
        </div>
        <div class="time-card">
          <div class="time-icon">🌳</div>
          <div class="time-label">Mycket skugga</div>
          <div class="time-value" id="t-full">—</div>
        </div>
      </div>

      <!-- Daily chart -->
      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title">UV-index idag</span>
          <span class="chart-peak" id="chart-peak"></span>
        </div>
        <div class="chart-container">
          <canvas id="uv-chart"></canvas>
        </div>
      </div>
      <!-- Refresh button -->
      <button class="refresh-btn" onclick="location.reload()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M13.65 2.35A8 8 0 1 0 15 8h-2a6 6 0 1 1-1.76-4.24L9 6h6V0l-1.35 2.35z" fill="#f0932b"/>
        </svg>
        Uppdatera
      </button>
    </div>

    <script src="main.js"></script>
  </body>
</html>
